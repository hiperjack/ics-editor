    thead.innerHTML =
      '<tr>' +
      '<th class="row-num">#</th>' +
      '<th class="col-title">タイトル</th>' +
      '<th class="col-dt">開始日時</th>' +
      '<th class="col-tz">開始TZ</th>' +
      '<th class="col-dt">終了日時</th>' +
      '<th class="col-tz">終了TZ</th>' +
      '<th class="col-loc">場所</th>' +
      '<th class="col-alarm">分前</th>' +
      '<th class="col-detail"></th>' +
      '<th class="col-actions"></th>' +
      '</tr>';
    table.appendChild(thead);

    // editor-views(スクロール域) の上端に列見出しを固定 (CSS側で position:sticky; top:0; が定義済)
    // 念のためz-indexだけ上げる
    thead.querySelectorAll('th').forEach(th => { th.style.zIndex = '5'; });

    const tbody = document.createElement('tbody');

    if (state.events.length === 0) {
      const emptyTr = document.createElement('tr');
      emptyTr.innerHTML = '<td colspan="10" style="text-align: center; padding: 1.5rem; color: var(--color-text-secondary); font-size: 13px;">イベントがありません。「+ 行を追加」または「+ イベント追加」から作成してください。</td>';
      tbody.appendChild(emptyTr);
    } else {
      state.events.forEach((e, idx) => {
        const isCrossTz = e.tzidStart !== e.tzidEnd;
        const tr = document.createElement('tr');
        tr.className = 'event-row' + (isCrossTz ? ' cross-tz' : '');
        tr.dataset.idx = String(idx);

        const startVal = dateObjToInputValue(e.dtstart);
        const endVal = dateObjToInputValue(e.dtend);
        const alarmVal = (e.alarmMinutes !== null && e.alarmMinutes !== undefined) ? e.alarmMinutes : '';
        // 既存イベントのTZが非表示でも選択肢に残るよう、currentValueを各行のTZに合わせる
        const startTzOptions = buildTZOptionsHTML(e.tzidStart);
        const endTzOptions = buildTZOptionsHTML(e.tzidEnd);

        tr.innerHTML =
          '<td class="row-num">' + (idx + 1) + '</td>' +
          '<td class="col-title"><input type="text" data-field="summary"></td>' +
          '<td class="col-dt"><input type="datetime-local" data-field="dtstart"></td>' +
          '<td class="col-tz"><select data-field="tzidStart">' + startTzOptions + '</select></td>' +
          '<td class="col-dt"><input type="datetime-local" data-field="dtend"></td>' +
          '<td class="col-tz"><select data-field="tzidEnd">' + endTzOptions + '</select></td>' +
          '<td class="col-loc"><input type="text" data-field="location"></td>' +
          '<td class="col-alarm"><input type="number" data-field="alarmMinutes" min="0" placeholder="-"></td>' +
          '<td class="col-detail"><button data-action="open-modal">詳細</button></td>' +
          '<td class="col-actions"><button data-action="delete" class="btn-danger">×</button></td>';

        // 値の設定(innerHTML経由ではなくpropertyで設定し、特殊文字エスケープを回避)
        tr.querySelector('input[data-field="summary"]').value = e.summary || '';
        tr.querySelector('input[data-field="dtstart"]').value = startVal;
        tr.querySelector('select[data-field="tzidStart"]').value = e.tzidStart || 'Asia/Tokyo';
        tr.querySelector('input[data-field="dtend"]').value = endVal;
        tr.querySelector('select[data-field="tzidEnd"]').value = e.tzidEnd || 'Asia/Tokyo';
        tr.querySelector('input[data-field="location"]').value = e.location || '';
        tr.querySelector('input[data-field="alarmMinutes"]').value = alarmVal;

        tbody.appendChild(tr);
      });
    }

    table.appendChild(tbody);
    wrap.appendChild(table);
    container.appendChild(wrap);

    const toolbar = document.createElement('div');
    toolbar.className = 'table-toolbar';
    toolbar.innerHTML =
      '<button id="table-add-btn">+ 行を追加</button>' +
      '<span class="table-hint">セルを直接編集できます。説明文や複数行入力は「詳細」ボタンから。</span>';
    container.appendChild(toolbar);

    // 行追加
    toolbar.querySelector('#table-add-btn').addEventListener('click', () => {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const today = {
        year: String(now.getFullYear()),
        month: pad(now.getMonth() + 1),
        day: pad(now.getDate()),
        hour: '09',
        minute: '00',
        second: '00'
      };
      const endToday = Object.assign({}, today, { hour: '10' });
      state.events.push({
        uid: '',
        summary: '',
        dtstart: today,
        dtend: endToday,
        tzidStart: 'Asia/Tokyo',
        tzidEnd: 'Asia/Tokyo',
        location: '',
        description: '',
        alarmMinutes: null
      });
      render();
      // 新規行のタイトル欄にフォーカス
      const rows = document.querySelectorAll('#table-view-list tbody tr.event-row');
      const last = rows[rows.length - 1];
      if (last) {
        const input = last.querySelector('input[data-field="summary"]');
        if (input) input.focus();
      }
    });

    // インライン編集 (change で確定保存)
    tbody.addEventListener('change', (ev) => {
      const tr = ev.target.closest('tr.event-row');
      if (!tr) return;
      const idx = parseInt(tr.dataset.idx, 10);
      const evt = state.events[idx];
      if (!evt) return;
      const field = ev.target.dataset.field;
      if (!field) return;

      if (field === 'dtstart' || field === 'dtend') {
        evt[field] = inputValueToDateObj(ev.target.value);
      } else if (field === 'alarmMinutes') {
        const v = ev.target.value.trim();
        evt.alarmMinutes = v === '' ? null : parseInt(v, 10);
      } else {
        evt[field] = ev.target.value;
      }

      if (field === 'tzidStart' || field === 'tzidEnd') {
        tr.classList.toggle('cross-tz', evt.tzidStart !== evt.tzidEnd);
      }
      saveState();
    });

    // 操作ボタン
    tbody.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-action]');
      if (!btn) return;
      const tr = btn.closest('tr.event-row');
      if (!tr) return;
      const idx = parseInt(tr.dataset.idx, 10);
      const action = btn.dataset.action;
      if (action === 'delete') {
        if (!confirm('このイベントを削除しますか?')) return;
        state.events.splice(idx, 1);
        render();
        showToast('イベントを削除しました');
      } else if (action === 'open-modal') {
        openEditModal(idx);
      }
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }

  function updateDurationDisplay() {
    const startVal = document.getElementById('m-start').value;
    const endVal = document.getElementById('m-end').value;
    const isCross = document.getElementById('m-cross-tz').checked;
    const tzStart = isCross ? document.getElementById('m-tz-start').value : document.getElementById('m-tz').value;
    const tzEnd = isCross ? document.getElementById('m-tz-end').value : document.getElementById('m-tz').value;
    const startD = inputValueToDateObj(startVal);
    const endD = inputValueToDateObj(endVal);
    const info = document.getElementById('duration-info');
    if (!startD || !endD) { info.style.display = 'none'; return; }
    const dur = calcDuration(startD, tzStart, endD, tzEnd);
    info.classList.remove('warn');
    if (!dur) {
      info.style.display = 'block';
      info.textContent = '⚠ 終了が開始より前になっています';
      info.classList.add('warn');
      return;
    }
    info.style.display = 'block';
    if (tzStart === tzEnd) {
      info.textContent = '所要時間: ' + dur.hours + '時間' + (dur.minutes > 0 ? dur.minutes + '分' : '');
    } else {
      const startUtc = dateObjToUtcMs(startD, tzStart);
      const endUtc = dateObjToUtcMs(endD, tzEnd);
      const tzS = getTzShortDynamic(tzStart, startUtc);
      const tzE = getTzShortDynamic(tzEnd, endUtc);
      info.textContent = '所要時間: ' + dur.hours + '時間' + (dur.minutes > 0 ? dur.minutes + '分' : '') + ' (' + tzS + ' → ' + tzE + ')';
    }
  }

  function toggleCrossTz() {
    const checked = document.getElementById('m-cross-tz').checked;
    document.getElementById('single-tz-row').style.display = checked ? 'none' : 'block';
    document.getElementById('dual-tz-row').style.display = checked ? 'grid' : 'none';
    document.querySelectorAll('.start-tz-label').forEach(el => el.textContent = checked ? '(出発地時刻)' : '(現地時刻)');
    document.querySelectorAll('.end-tz-label').forEach(el => el.textContent = checked ? '(到着地時刻)' : '(現地時刻)');
    if (checked) {
      const single = document.getElementById('m-tz').value;
      if (!document.getElementById('m-tz-start').value) document.getElementById('m-tz-start').value = single;
      if (!document.getElementById('m-tz-end').value) document.getElementById('m-tz-end').value = single;
    }
    updateDurationDisplay();
  }

  function openEditModal(idx) {
    editingIndex = idx;
    const e = idx === null ? {
      summary: '', dtstart: null, dtend: null, tzidStart: 'Asia/Tokyo', tzidEnd: 'Asia/Tokyo',
      location: '', description: '', alarmMinutes: null
    } : state.events[idx];

    const isCross = e.tzidStart !== e.tzidEnd;

    document.getElementById('modal-title').textContent = idx === null ? 'イベントを追加' : 'イベントを編集';
    document.getElementById('m-summary').value = e.summary || '';
    document.getElementById('m-start').value = dateObjToInputValue(e.dtstart);
    document.getElementById('m-end').value = dateObjToInputValue(e.dtend);
    document.getElementById('m-cross-tz').checked = isCross;
    // 既存イベントのTZが非表示設定でも選択肢に残るよう、currentValue指定で再生成
    populateTZSelect(document.getElementById('m-tz'), e.tzidStart);
    populateTZSelect(document.getElementById('m-tz-start'), e.tzidStart);
    populateTZSelect(document.getElementById('m-tz-end'), e.tzidEnd);
    document.getElementById('m-tz').value = e.tzidStart || 'Asia/Tokyo';
    document.getElementById('m-tz-start').value = e.tzidStart || 'Asia/Tokyo';
    document.getElementById('m-tz-end').value = e.tzidEnd || 'Asia/Tokyo';
    document.getElementById('m-location').value = e.location || '';
    document.getElementById('m-description').value = e.description || '';
    document.getElementById('m-alarm').value = e.alarmMinutes !== null && e.alarmMinutes !== undefined ? e.alarmMinutes : '';
    document.getElementById('modal-delete-btn').style.display = idx === null ? 'none' : 'inline-block';

    toggleCrossTz();
    document.getElementById('event-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('event-modal').classList.remove('open');
    editingIndex = null;
  }

  function saveModal() {
    const summary = document.getElementById('m-summary').value.trim();
    const start = inputValueToDateObj(document.getElementById('m-start').value);
    const end = inputValueToDateObj(document.getElementById('m-end').value);
    const isCross = document.getElementById('m-cross-tz').checked;
    const tzidStart = isCross ? document.getElementById('m-tz-start').value : document.getElementById('m-tz').value;
    const tzidEnd = isCross ? document.getElementById('m-tz-end').value : document.getElementById('m-tz').value;
    const location = document.getElementById('m-location').value.trim();
    const description = document.getElementById('m-description').value.trim();
    const alarmStr = document.getElementById('m-alarm').value.trim();
    const alarmMinutes = alarmStr === '' ? null : parseInt(alarmStr, 10);

    if (!summary) { alert('タイトルを入力してください'); return; }
    if (!start || !end) { alert('開始日時と終了日時を入力してください'); return; }

    const ev = { uid: '', summary, dtstart: start, dtend: end, tzidStart, tzidEnd, location, description, alarmMinutes };

    if (editingIndex === null) {
      state.events.push(ev);
      showToast('イベントを追加しました');
    } else {
      ev.uid = state.events[editingIndex].uid;
      state.events[editingIndex] = ev;
      showToast('イベントを保存しました');
    }
    closeModal();
    render();
  }

  function deleteEvent() {
    if (editingIndex === null) return;
    if (!confirm('このイベントを削除しますか?')) return;
    state.events.splice(editingIndex, 1);
    showToast('イベントを削除しました');
    closeModal();
    render();
  }

  // === TZ表示設定モーダル ===
  function openTZSettings() {
    renderTZSettingsList();
    document.getElementById('tz-settings-modal').classList.add('open');
  }

  function closeTZSettings() {
    document.getElementById('tz-settings-modal').classList.remove('open');
  }

  function renderTZSettingsList() {
    const list = document.getElementById('tz-settings-list');
    list.innerHTML = '';
    const usedTZs = new Set();
    state.events.forEach(e => { usedTZs.add(e.tzidStart); usedTZs.add(e.tzidEnd); });

    TZ_LIST.forEach(tz => {
      const isEnabled = !enabledTZs || enabledTZs.has(tz.id);
      const inUse = usedTZs.has(tz.id);
      const row = document.createElement('label');
      row.className = 'tz-settings-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.tzId = tz.id;
      cb.checked = isEnabled;
      cb.addEventListener('change', updateTZSettingsCount);
      const label = document.createElement('span');
      label.className = 'tz-row-label';
      label.textContent = tzLabel(tz) + (inUse ? '  ・ 使用中' : '');
      row.appendChild(cb);
      row.appendChild(label);
      list.appendChild(row);
    });
    updateTZSettingsCount();
  }

  function updateTZSettingsCount() {
    const cbs = document.querySelectorAll('#tz-settings-list input[type="checkbox"]');
    const checked = [...cbs].filter(c => c.checked).length;
    document.getElementById('tz-settings-count').textContent = checked + ' / ' + cbs.length + ' 件選択中';
  }

  function setTZSettingsAll(checked) {
    document.querySelectorAll('#tz-settings-list input[type="checkbox"]').forEach(cb => {
      cb.checked = checked;
    });
    updateTZSettingsCount();
  }

  function applyTZSettingsPreset(presetSet) {
    document.querySelectorAll('#tz-settings-list input[type="checkbox"]').forEach(cb => {
      cb.checked = presetSet.has(cb.dataset.tzId);
    });
    updateTZSettingsCount();
  }

  function saveTZSettings() {
    const cbs = document.querySelectorAll('#tz-settings-list input[type="checkbox"]');
    const enabled = [...cbs].filter(c => c.checked).map(c => c.dataset.tzId);
    if (enabled.length === 0) {
      alert('少なくとも1つは選択してください');
      return;
    }
    if (enabled.length === TZ_LIST.length) {
      enabledTZs = null; // 全て選択は「制限なし」と等価
    } else {
      enabledTZs = new Set(enabled);
    }
    saveState();
    closeTZSettings();
    render();
    showToast('表示TZ設定を保存しました');
  }

  // ICSを生成してダウンロード(共通処理)
  function buildAndDownloadICS() {
    state.calName = document.getElementById('cal-name').value || 'My Calendar';
    const ics = generateICS();
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = state.calName.replace(/[^\w\s\-ぁ-んァ-ヶ一-龥]/g, '_') + '.ics';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function downloadICS() {
    buildAndDownloadICS();
    showToast('ICSファイルをダウンロードしました');
  }

  // Googleカレンダーのインポート/エクスポート設定画面を新規タブで開く
  // ブラウザ単体ではアカウントへの直接書き込み不可のため、
  // ダウンロードしたファイルをユーザーがImport画面でアップロードする2ステップ運用
  function openInGoogle() {
    buildAndDownloadICS();
    window.open('https://calendar.google.com/calendar/u/0/r/settings/export', '_blank', 'noopener,noreferrer');
    showToast('.icsをダウンロードしました。Googleカレンダーのタブで「コンピュータからファイルを選択」してください');
  }

  // Outlookカレンダーの追加画面を新規タブで開く(業務アカウント outlook.office.com)
  function openInOutlook() {
    buildAndDownloadICS();
    window.open('https://outlook.office.com/calendar/addcalendar?deeplink=calendar%2F0%2Faddcalendar', '_blank', 'noopener,noreferrer');
    showToast('.icsをダウンロードしました。Outlookのタブで「ファイルからアップロード」を選択してください');
  }

  // === Init ===
  populateTZSelect(document.getElementById('m-tz'));
  populateTZSelect(document.getElementById('m-tz-start'));
  populateTZSelect(document.getElementById('m-tz-end'));

  loadState();

  document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const result = parseICS(ev.target.result);
        state = { calName: result.calName, events: result.events, loaded: true };
        render();
        showToast(result.events.length + '件のイベントを読み込みました');
      } catch (err) {
        alert('ICSファイルの読み込みに失敗しました: ' + err.message);
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('new-blank-btn').addEventListener('click', () => {
    state = { calName: 'My Calendar', loaded: true, events: [] };
    render();
  });

  document.getElementById('header-collapse-btn').addEventListener('click', () => {
    headerCollapsed = !headerCollapsed;
    saveState();
    render();
  });
  document.getElementById('add-event-btn').addEventListener('click', () => openEditModal(null));
  document.getElementById('download-btn').addEventListener('click', downloadICS);
  document.getElementById('open-google-btn').addEventListener('click', openInGoogle);
  document.getElementById('open-outlook-btn').addEventListener('click', openInOutlook);
  document.getElementById('tz-settings-btn').addEventListener('click', openTZSettings);
  document.getElementById('tz-settings-cancel').addEventListener('click', closeTZSettings);
  document.getElementById('tz-settings-save').addEventListener('click', saveTZSettings);
  document.getElementById('tz-settings-all').addEventListener('click', () => setTZSettingsAll(true));
  document.getElementById('tz-settings-none').addEventListener('click', () => setTZSettingsAll(false));
  document.getElementById('tz-settings-preset-major').addEventListener('click', () => applyTZSettingsPreset(TZ_PRESET_MAJOR));
  document.getElementById('tz-settings-modal').addEventListener('click', (e) => {
    if (e.target.id === 'tz-settings-modal') closeTZSettings();
  });
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('現在のカレンダーをリセットしますか?(localStorageの保存もクリアされます)')) return;
    state = { calName: 'My Calendar', loaded: false, events: [] };
    try { localStorage.removeItem('ics-editor-state'); } catch (e) {}
    render();
  });
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-save-btn').addEventListener('click', saveModal);
  document.getElementById('modal-delete-btn').addEventListener('click', deleteEvent);
  document.getElementById('m-cross-tz').addEventListener('change', toggleCrossTz);
  document.getElementById('m-start').addEventListener('change', updateDurationDisplay);
  document.getElementById('m-end').addEventListener('change', updateDurationDisplay);
  document.getElementById('m-tz').addEventListener('change', updateDurationDisplay);
  document.getElementById('m-tz-start').addEventListener('change', updateDurationDisplay);
  document.getElementById('m-tz-end').addEventListener('change', updateDurationDisplay);
  document.getElementById('cal-name').addEventListener('input', (e) => { state.calName = e.target.value; saveState(); });

  // ビュー切替ボタン
  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      if (currentView === 'week') weekOffset = 0;
      render();
    });
  });

  // Modal: ESCで閉じる、背景クリックで閉じる
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('tz-settings-modal').classList.contains('open')) {
      closeTZSettings();
    } else if (document.getElementById('event-modal').classList.contains('open')) {
      closeModal();
    }
  });
  document.getElementById('event-modal').addEventListener('click', (e) => {
    if (e.target.id === 'event-modal') closeModal();
  });

  // モバイル/デスクトップのブレイクポイント切替時に再描画
  // (PCで開いていたタブをタブレットに持ち替え、スマホの回転、等)
  if (window.matchMedia) {
    const mq = window.matchMedia(MOBILE_MEDIA_QUERY);
    const onChange = () => { if (state.events.length > 0 || state.loaded) render(); };
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else if (mq.addListener) mq.addListener(onChange); // Safari旧版フォールバック
  }

  render();
})();
</script>
</body>
</html>
